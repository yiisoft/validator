name: backwards compatibility

on:
  pull_request:
    paths: &paths
      - 'src/**'
      - '.github/workflows/bc.yml'
      - '.roave-backward-compatibility-check.xml'
      - 'composer.json'
  push:
    branches: ['master']
    paths: *paths

permissions:
  contents: read

jobs:
  roave_bc_check:
    uses: yiisoft/actions/.github/workflows/bc.yml@master
    with:
      php: >-
        ['8.3']
