name: benchmark

on:
  pull_request:
    paths: &paths
      - 'src/**'
      - 'tests/Benchmark/**'
      - 'composer.json'
      - 'phpbench.json'
  push:
    branches: ['master']
    paths: *paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpbench:
    uses: yiisoft/actions/.github/workflows/phpbench.yml@master
    with:
      os: >-
        ['ubuntu-latest', 'windows-latest']
      php: >-
        ['8.1']
